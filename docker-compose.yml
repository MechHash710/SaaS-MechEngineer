version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: projeto8_db
    environment:
      POSTGRES_USER: engineering_user
      POSTGRES_PASSWORD: engineering_pass
      POSTGRES_DB: engineering_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - projeto8_net

  backend:
    image: python:3.12-slim
    container_name: projeto8_backend
    working_dir: /app
    volumes:
      - ./backend_api:/app
    ports:
      - "8000:8000"
    command: >
      bash -c "pip install --no-cache-dir -r requirements.txt &&
               uvicorn main:app --host 0.0.0.0 --port 8000 --reload"
    networks:
      - projeto8_net
    environment:
      - PYTHONDONTWRITEBYTECODE=1
      - PYTHONUNBUFFERED=1
      - DATABASE_URL=postgresql://engineering_user:engineering_pass@db:5432/engineering_db
    depends_on:
      - db

  frontend:
    image: node:20-alpine
    container_name: projeto8_frontend
    working_dir: /app
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "5173:5173"
    command: >
      sh -c "npm install && npm run dev -- --host 0.0.0.0"
    networks:
      - projeto8_net

networks:
  projeto8_net:
    driver: bridge

volumes:
  postgres_data:
